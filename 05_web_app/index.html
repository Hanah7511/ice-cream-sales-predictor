<!DOCTYPE html>
<html>

<head>
<title>Ice Cream Sales Predictor</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
background-color:#f4f4f4;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:#45a049;
}

</style>

</head>

<body>

<h1>🍦 Ice Cream Sales Predictor</h1>

<p>This AI model predicts ice cream sales based on temperature using Linear Regression.</p>

<h3>Enter Temperature</h3>

<input id="temp" type="number" placeholder="Temperature (°C)" min="20" max="45">

<br><br>

<button onclick="predict()">Predict Sales</button>

<h2 id="result"></h2>

<script>

function predict(){

let temp = document.getElementById("temp").value

if(temp < 20 || temp > 45){
document.getElementById("result").innerText =
"Please enter a temperature between 20°C and 45°C"
return
}

let m = 14.299363057324841
let b = -269.8407643312102

let sales = m * temp + b

document.getElementById("result").innerText =
"Predicted Ice Cream Sales: " + Math.round(sales)

}

</script>

</body>

</html>
